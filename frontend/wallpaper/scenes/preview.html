<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>AuroraParticles — preview</title>
<style>
  html,body { margin:0; padding:0; height:100%; background:#000; overflow:hidden; font-family:ui-monospace,monospace; color:#cbd5e1; }
  #stage { position:fixed; inset:0; }
  #hud {
    position:fixed; top:12px; left:12px; z-index:10; padding:10px 12px;
    background:rgba(10,12,20,.65); border:1px solid rgba(148,163,184,.25);
    border-radius:8px; font-size:12px; line-height:1.5; backdrop-filter: blur(6px);
  }
  #hud b { color:#e2e8f0; }
  #hud kbd { background:rgba(148,163,184,.18); padding:1px 5px; border-radius:3px; font-size:11px; }
</style>
</head>
<body>
  <canvas id="stage"></canvas>
  <div id="hud">
    <b>AuroraParticles preview</b><br>
    move cursor over field — should orbit, not clump<br>
    park cursor off-screen — should drift on flow<br>
    <kbd>1/2</kbd> flow amp · <kbd>3/4</kbd> repel px · <kbd>5/6</kbd> damping
    <div id="vals" style="margin-top:6px;color:#94a3b8"></div>
  </div>
<script>
// === Constants — mirror AuroraParticles.vue ===
let MOUSE_RADIUS = 220;
let MOUSE_RADIUS_SQ = MOUSE_RADIUS*MOUSE_RADIUS;
let MOUSE_ATTRACT = 0.022;
let MOUSE_REPEL_PX = 50;
let MOUSE_RADIAL = 0.3;
let MOUSE_TANGENTIAL = 0.7;
let VELOCITY_DAMPING = 0.985;
let MIN_SPEED = 0.04;
let MAX_SPEED = 1.4;
let SEED_MAX_SPEED = 0.10;
let FLOW_AMP = 0.006;
const FLOW_SCALE_XY = 0.0018;
const FLOW_SCALE_T = 0.06;
const MOUSE_FOLLOW = 0.18;

const c = document.getElementById('stage');
const ctx = c.getContext('2d');
let viewW=0, viewH=0, dpr=1;
let mouseX=-9999, mouseY=-9999, smoothMouseX=-9999, smoothMouseY=-9999;
const particles=[];

function targetCount(w,h){ return Math.max(24, Math.min(80, Math.round((w*h)/25000))); }
function makeParticle(w,h){
  const a = Math.random()*Math.PI*2;
  const s = MIN_SPEED + Math.random()*(SEED_MAX_SPEED-MIN_SPEED);
  return { x:Math.random()*w, y:Math.random()*h, vx:Math.cos(a)*s, vy:Math.sin(a)*s,
           r:Math.random()*2+0.5, hue:180+Math.random()*120, alpha:Math.random()*0.5+0.2 };
}
function reconcile(w,h){
  const want = targetCount(w,h);
  for (const p of particles){ if(p.x<0||p.x>w) p.x=Math.random()*w; if(p.y<0||p.y>h) p.y=Math.random()*h; }
  while(particles.length<want) particles.push(makeParticle(w,h));
  if(particles.length>want) particles.length=want;
}
function resize(){
  dpr = Math.min(window.devicePixelRatio||1, 2);
  viewW = window.innerWidth; viewH = window.innerHeight;
  c.width = Math.max(1, Math.floor(viewW*dpr));
  c.height = Math.max(1, Math.floor(viewH*dpr));
  c.style.width = viewW+'px'; c.style.height = viewH+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  reconcile(viewW, viewH);
  bgGrad=null; auroraGrad=null;
}

let bgGrad=null, bgFrame=0; const BG_REBUILD_EVERY=16;
let auroraGrad=null, auroraFrame=0; const AURORA_REBUILD_EVERY=8;
function buildBgGrad(w,h,t){
  const t1=(Math.sin(t*0.1)+1)/2, t2=(Math.cos(t*0.13)+1)/2;
  const g=ctx.createLinearGradient(0,0,w,h);
  g.addColorStop(0, `hsl(${260+t1*30}, 60%, ${8+t1*4}%)`);
  g.addColorStop(0.5, `hsl(${220+t2*40}, 70%, ${10+t2*6}%)`);
  g.addColorStop(1, `hsl(${190+t1*30}, 80%, ${6+t2*4}%)`);
  return g;
}
function buildAuroraGrad(w,h,t){
  const ay = h*0.4 + Math.sin(t*0.3)*30;
  const g=ctx.createLinearGradient(0, ay-200, 0, ay+200);
  g.addColorStop(0, 'rgba(56, 189, 248, 0)');
  g.addColorStop(0.5, `rgba(${100+Math.sin(t)*50}, ${200+Math.cos(t*0.7)*30}, 255, 0.18)`);
  g.addColorStop(1, 'rgba(167, 139, 250, 0)');
  return g;
}

function frame(){
  const w=viewW, h=viewH, time=performance.now()/1000;

  if(!bgGrad || bgFrame<=0){ bgGrad=buildBgGrad(w,h,time); bgFrame=BG_REBUILD_EVERY; }
  bgFrame--; ctx.fillStyle=bgGrad; ctx.fillRect(0,0,w,h);
  if(!auroraGrad || auroraFrame<=0){ auroraGrad=buildAuroraGrad(w,h,time); auroraFrame=AURORA_REBUILD_EVERY; }
  auroraFrame--; ctx.fillStyle=auroraGrad; ctx.fillRect(0,0,w,h);

  if (mouseX<-9000){ smoothMouseX=mouseX; smoothMouseY=mouseY; }
  else if (smoothMouseX<-9000){ smoothMouseX=mouseX; smoothMouseY=mouseY; }
  else { smoothMouseX += (mouseX-smoothMouseX)*MOUSE_FOLLOW; smoothMouseY += (mouseY-smoothMouseY)*MOUSE_FOLLOW; }

  const timeTwinkle = time*0.9;
  for (const p of particles){
    // flow-field drift
    const ang = (Math.sin(p.x*FLOW_SCALE_XY + time*FLOW_SCALE_T)
              + Math.cos(p.y*FLOW_SCALE_XY + time*FLOW_SCALE_T*0.83)) * Math.PI;
    p.vx += Math.cos(ang)*FLOW_AMP;
    p.vy += Math.sin(ang)*FLOW_AMP;

    // mouse — orbit (sign flip inside repel zone)
    const mdx = smoothMouseX-p.x, mdy = smoothMouseY-p.y;
    const distSq = mdx*mdx + mdy*mdy;
    if (distSq < MOUSE_RADIUS_SQ && distSq > 0.0001){
      const dist = Math.sqrt(distSq);
      const t = 1 - dist/MOUSE_RADIUS;
      const edge = t*t*(3-2*t);
      const rx = mdx/dist, ry = mdy/dist;
      const tx = -ry, ty = rx;
      const sign = dist < MOUSE_REPEL_PX ? -1 : 1;
      p.vx += (sign*rx*MOUSE_RADIAL + tx*MOUSE_TANGENTIAL)*edge*MOUSE_ATTRACT;
      p.vy += (sign*ry*MOUSE_RADIAL + ty*MOUSE_TANGENTIAL)*edge*MOUSE_ATTRACT;
    }

    p.vx *= VELOCITY_DAMPING; p.vy *= VELOCITY_DAMPING;
    const sp = Math.sqrt(p.vx*p.vx + p.vy*p.vy);
    if (sp > MAX_SPEED){ const k=MAX_SPEED/sp; p.vx*=k; p.vy*=k; }
    else if (sp < MIN_SPEED && sp > 0){
      const a = Math.atan2(p.vy, p.vx);
      p.vx = Math.cos(a)*MIN_SPEED; p.vy = Math.sin(a)*MIN_SPEED;
    }

    p.x += p.vx; p.y += p.vy;
    if (p.x < -5) p.x = w+5;
    if (p.x > w+5) p.x = -5;
    if (p.y < -5) p.y = h+5;
    if (p.y > h+5) p.y = -5;

    const twinkle = (Math.sin(timeTwinkle + p.hue*0.05)+1)/2;
    const a = p.alpha*(0.5 + twinkle*0.5);
    ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${a})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `hsla(${p.hue}, 80%, 70%, ${p.alpha*0.15})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r*4, 0, Math.PI*2); ctx.fill();
  }
  requestAnimationFrame(frame);
}

const vals = document.getElementById('vals');
function showVals(){
  vals.textContent = `FLOW_AMP=${FLOW_AMP.toFixed(4)}  REPEL=${MOUSE_REPEL_PX}px  DAMP=${VELOCITY_DAMPING.toFixed(3)}`;
}
window.addEventListener('mousemove', e => { mouseX=e.clientX; mouseY=e.clientY; }, { passive:true });
document.addEventListener('mouseleave', () => { mouseX=-9999; mouseY=-9999; });
window.addEventListener('resize', resize);
window.addEventListener('keydown', e => {
  if (e.key==='1') FLOW_AMP = Math.max(0, FLOW_AMP-0.002);
  if (e.key==='2') FLOW_AMP = Math.min(0.05, FLOW_AMP+0.002);
  if (e.key==='3') MOUSE_REPEL_PX = Math.max(0, MOUSE_REPEL_PX-10);
  if (e.key==='4') MOUSE_REPEL_PX = Math.min(MOUSE_RADIUS, MOUSE_REPEL_PX+10);
  if (e.key==='5') VELOCITY_DAMPING = Math.max(0.95, VELOCITY_DAMPING-0.005);
  if (e.key==='6') VELOCITY_DAMPING = Math.min(0.999, VELOCITY_DAMPING+0.005);
  showVals();
});
showVals();
resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
